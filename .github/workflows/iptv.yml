name: IPTV Daily Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      IPTV_TIMEOUT: 3
      IPTV_MAX_PARALLEL: 200
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install aiohttp
    - name: Setup email notification config
      run: |
        echo "=== 配置邮件通知 ==="
        mkdir -p config
        
        python3 << 'PYEOF'
        import json
        
        config = {
            "email_notification_enabled": True,
            "email_smtp_host": """${{ secrets.SMTP_HOST }}""",
            "email_smtp_port": int("""${{ secrets.SMTP_PORT }}"") if """${{ secrets.SMTP_PORT }}""".isdigit() else 587,
            "email_smtp_user": """${{ secrets.SMTP_USER }}""",
            "email_smtp_password": """${{ secrets.SMTP_PASSWORD }}""",
            "email_from_name": "IPTV直播源监控",
            "email_to": """${{ secrets.EMAIL_TO }}""",
            "watch_files": [
                "file/best_sorted.m3u",
                "file/best_sorted.m3u8"
            ],
            "email_cooldown_seconds": 300,
            "email_max_fail_count": 3,
            "email_fail_cooldown_seconds": 1800
        }
        
        with open('config/notify.json', 'w', encoding='utf-8') as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
        
        print("✅ 邮件配置文件已创建")
        print(f"SMTP Host: {config['email_smtp_host']}")
        print(f"SMTP Port: {config['email_smtp_port']}")
        print(f"SMTP User: {config['email_smtp_user']}")
        print(f"Email To: {config['email_to']}")
        PYEOF
        
    - name: Run scraping script
      run: python .github/workflows/iptv.py
    - name: GetTime
      run: echo "GET_TIME=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_ENV
    - name: Update README.md with run time and file link
      run: |
        file_link="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.m3u"
        file_link1="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.m3u8"
        sed -i "s|<!-- Last Run Time -->.*|<!-- Last Run Time --> ${GET_TIME}|" README.md
        sed -i "s|<!-- Generated File Link M3U -->.*|<!-- Generated File Link M3U --> [View M3U File](${file_link})|" README.md
        sed -i "s|<!-- Generated File Link M3U8 -->.*|<!-- Generated File Link M3U8 --> [View M3U8 File](${file_link1})|" README.md
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        echo "=== 检查文件是否存在 ==="
        ls -lh README.md file/ 2>&1 || true
        
        if [ -f "README.md" ] && [ -f "file/best_sorted.m3u" ] && [ -f "file/best_sorted.m3u8" ]; then
          echo "=== 所有文件存在，准备提交 ==="
          git add README.md
          git add -f file/best_sorted.m3u
          git add -f file/best_sorted.m3u8
          
          echo "=== 检查是否有变更 ==="
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "=== 正在提交和推送 ==="
            git commit -m "自动更新：${GET_TIME}"
            git push origin HEAD:${{ github.ref }}
            echo "Changes pushed successfully"
          fi
        else
          echo "=== 错误：必需文件不存在 ==="
          find . -name "*.m3u*" -type f 2>/dev/null | head -20
          exit 1
        fi
    - name: Send email notification
      run: |
        echo "=== 发送邮件通知 ==="
        python script/notify.py --once
        EXIT_CODE=$?
        echo "=== 邮件通知退出码: $EXIT_CODE ==="
        
        case $EXIT_CODE in
          0)
            echo "✅ 邮件通知发送成功"
            echo "EMAIL_SENT=true" >> $GITHUB_ENV
            ;;
          1)
            echo "❌ 错误：配置文件不存在或读取失败"
            echo "EMAIL_SENT=false" >> $GITHUB_ENV
            ;;
          2)
            echo "⚠️ 跳过：邮件通知未启用"
            echo "EMAIL_SENT=false" >> $GITHUB_ENV
            ;;
          3)
            echo "⚠️ 跳过：未检测到文件变更或发送失败"
            echo "EMAIL_SENT=false" >> $GITHUB_ENV
            ;;
          *)
            echo "❌ 未知错误，退出码: $EXIT_CODE"
            echo "EMAIL_SENT=false" >> $GITHUB_ENV
            ;;
        esac
        
        echo ""
        echo "=== 检查监控文件是否存在 ==="
        for f in file/best_sorted.m3u file/best_sorted.m3u8; do
          if [ -f "$f" ]; then
            size=$(wc -c < "$f")
            echo "✓ $f 存在 (大小: $size 字节)"
          else
            echo "✗ $f 不存在"
          fi
        done
    - name: Save and commit notify hashes
      run: |
        echo "=== 保存邮件通知哈希记录 ==="
        
        if [ -f "config/.notify_hashes.json" ]; then
          echo "=== 发现哈希记录文件，准备提交 ==="
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add -f config/.notify_hashes.json
          
          if git diff --cached --quiet; then
            echo "哈希记录无变化，跳过提交"
          else
            git commit -m "更新邮件通知哈希记录：${GET_TIME}"
            git push origin HEAD:${{ github.ref }}
            echo "✅ 哈希记录已保存到仓库"
          fi
        else
          echo "⚠️ 未生成哈希记录文件（可能监控文件不存在或通知未启用）"
        fi