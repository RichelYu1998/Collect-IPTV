name: IPTV Daily Update

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    env:
      IPTV_TIMEOUT: 3
      IPTV_MAX_PARALLEL: 200
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install aiohttp
      
    - name: Setup email notification config
      env:
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: |
        echo "=== Setup SMTP email config ==="
        mkdir -p config
        
        python3 << 'PYEOF'
        import json
        import os
        
        smtp_host = os.environ.get('SMTP_HOST', 'smtp.qq.com')
        smtp_port = os.environ.get('SMTP_PORT', '587')
        smtp_user = os.environ.get('SMTP_USER', '')
        smtp_password = os.environ.get('SMTP_PASSWORD', '')
        email_to = os.environ.get('EMAIL_TO', '')
        
        if not smtp_user or not smtp_password or not email_to:
            print('SMTP config incomplete, email will be skipped')
        
        config = {
          'email_provider': 'smtp',
          'email_notification_enabled': True,
          'email_smtp_host': smtp_host,
          'email_smtp_port': int(smtp_port),
          'email_smtp_user': smtp_user,
          'email_smtp_password': smtp_password,
          'email_from_name': 'IPTV',
          'email_to': email_to,
          'github_repo': '${{ github.repository }}',
          'github_branch': '${{ github.ref_name }}',
          'watch_files': [
            'file/best_sorted.m3u',
            'file/best_sorted.m3u8'
          ]
        }
        
        with open('config/notify.json', 'w', encoding='utf-8') as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
        
        print('SMTP config created')
        PYEOF


    - name: Run scraping script
      run: python .github/workflows/iptv.py
      
    - name: GetTime
      run: echo "GET_TIME=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_ENV
      
    - name: Update README.md with run time and file link
      run: |
        file_link="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.m3u"
        file_link1="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.m3u8"
        file_link_txt="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.txt"
        file_link_api="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/api_data.json"
        sed -i "s|<!-- Last Run Time -->.*|<!-- Last Run Time --> ${GET_TIME}|" README.md
        sed -i "s|<!-- Generated File Link M3U -->.*|<!-- Generated File Link M3U --> [View M3U File](${file_link})|" README.md
        sed -i "s|<!-- Generated File Link M3U8 -->.*|<!-- Generated File Link M3U8 > [View M3U8 File](${file_link1})|" README.md
        sed -i "s|<!-- Generated File Link TXT -->.*|<!-- Generated File Link TXT --> [View TXT File](${file_link_txt})|" README.md
        sed -i "s|<!-- Generated File Link API -->.*|<!-- Generated File Link API --> [View API Data](${file_link_api})|" README.md
        
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        if [ -f "file/best_sorted.m3u" ] && [ -f "file/best_sorted.m3u8" ]; then
          echo "=== 必需文件存在 ==="
          git add README.md
          git add -f file/best_sorted.m3u
          git add -f file/best_sorted.m3u8
          git add -f file/best_sorted.txt
          git add -f file/stats_report.json
          git add -f file/api_data.json
          git add -f file/best_sorted_gh-proxy.m3u 2>/dev/null || true
          git add -f file/best_sorted_ghproxy-mirror.m3u 2>/dev/null || true
          
          echo "=== 检查是否有变更 ==="
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "=== 正在提交和推送 ==="
            git commit -m "自动更新：${GET_TIME}"
            git push origin HEAD:${{ github.ref }}
            echo "Changes pushed successfully"
          fi
        else
          echo "=== 错误：必需文件不存在 ==="
          find . -name "*.m3u*" -type f 2>/dev/null | head -20
          exit 1
        fi
        
    - name: Send email notification
      run: |
        echo "=== Send email notification ==="
        python script/notify.py --once
        EXIT_CODE=$?
        echo "Exit code: $EXIT_CODE"
        
        case $EXIT_CODE in
          0) echo "Email sent successfully" ;;
          1) echo "Error: config not found" ;;
          2) echo "Skipped: email disabled" ;;
          3) echo "Skipped: no changes or send failed" ;;
          *) echo "Unknown error: $EXIT_CODE" ;;
        esac


    - name: Save and commit notify hashes
      run: |
        echo "=== Save notify hashes ==="
        
        if [ -f "config/.notify_hashes.json" ]; then
          echo "Hash file found, committing..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -f config/.notify_hashes.json
        
          if git diff --cached --quiet; then
            echo "No hash changes to commit"
          else
            git commit -m "Update notify hashes"
            git push origin HEAD:${{ github.ref }}
            echo "Hashes saved to repo"
          fi
        else
          echo "No hash file (email may not have been sent)"
        fi