name: IPTV Daily Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      IPTV_TIMEOUT: 3
      IPTV_MAX_PARALLEL: 200
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install aiohttp
    - name: Run scraping script
      run: python .github/workflows/iptv.py
    - name: GetTime
      run: echo "GET_TIME=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_ENV
    - name: Update README.md with run time and file link
      run: |
        file_link="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.m3u"
        file_link1="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/file/best_sorted.m3u8"
        sed -i "s|<!-- Last Run Time -->.*|<!-- Last Run Time --> ${GET_TIME}|" README.md
        sed -i "s|<!-- Generated File Link M3U -->.*|<!-- Generated File Link M3U --> [View M3U File](${file_link})|" README.md
        sed -i "s|<!-- Generated File Link M3U8 -->.*|<!-- Generated File Link M3U8 --> [View M3U8 File](${file_link1})|" README.md
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        echo "=== 检查文件是否存在 ==="
        ls -lh README.md file/ 2>&1 || true
        
        if [ -f "README.md" ] && [ -f "file/best_sorted.m3u" ] && [ -f "file/best_sorted.m3u8" ]; then
          echo "=== 所有文件存在，准备提交 ==="
          git add README.md
          git add -f file/best_sorted.m3u
          git add -f file/best_sorted.m3u8
          
          echo "=== 检查是否有变更 ==="
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "=== 正在提交和推送 ==="
            git commit -m "自动更新：${GET_TIME}"
            git push origin HEAD:${{ github.ref }}
            echo "Changes pushed successfully"
          fi
        else
          echo "=== 错误：必需文件不存在 ==="
          find . -name "*.m3u*" -type f 2>/dev/null | head -20
          exit 1
        fi
    - name: Send email notification
      run: |
        echo "=== 发送邮件通知 ==="
        python script/notify.py --once
        EXIT_CODE=$?
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✅ 邮件通知发送成功"
          echo "EMAIL_SENT=true" >> $GITHUB_ENV
        else
          echo "⚠️ 邮件通知跳过（无变更或首次运行已标记）"
          echo "EMAIL_SENT=false" >> $GITHUB_ENV
        fi
    - name: Save and commit notify hashes
      run: |
        echo "=== 保存邮件通知哈希记录 ==="
        
        if [ -f "config/.notify_hashes.json" ]; then
          echo "=== 发现哈希记录文件，准备提交 ==="
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add -f config/.notify_hashes.json
          
          if git diff --cached --quiet; then
            echo "哈希记录无变化，跳过提交"
          else
            git commit -m "更新邮件通知哈希记录：${GET_TIME}"
            git push origin HEAD:${{ github.ref }}
            echo "✅ 哈希记录已保存到仓库"
          fi
        else
          echo "⚠️ 未生成哈希记录文件（可能监控文件不存在或通知未启用）"
        fi